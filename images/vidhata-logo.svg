<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <!-- Mask to create the crisp, perfectly measured white cutout gap around the red circle -->
    <mask id="cutout-mask">
      <!-- Everything white remains visible -->
      <rect x="0" y="0" width="500" height="500" fill="white" />
      <!-- The black circle erases the blue shapes behind it -->
      <circle cx="345" cy="270" r="75" fill="black" />
    </mask>
  </defs>

  <!-- Solid White Background for the inner square -->
  <rect x="50" y="50" width="400" height="400" fill="#ffffff" />

  <!-- Blue logo elements with the cutout mask applied -->
  <g mask="url(#cutout-mask)">
    <!-- Main Left Inverted Triangle (Flush with the top border) -->
    <polygon points="70,50 340,50 260,390" fill="#2C3288" />
    
    <!-- Bottom Right Pillar (Flush with the bottom border) -->
    <rect x="308" y="250" width="74" height="200" fill="#2C3288" />
  </g>

  <!-- The Red Circle (Centered perfectly within the cutout gap) -->
  <circle cx="345" cy="270" r="55" fill="#DF2A29" />

  <!-- The Thin Blue Outer Square Border -->
  <rect x="50" y="50" width="400" height="400" fill="none" stroke="#2C3288" stroke-width="2.5" />
</svg>
